; PlatformIO Project Configuration File
;
; XIAO ESP32-S3 Sense Camera Streaming
;
; Build and upload:
;   pio run -t upload
;
; Monitor serial:
;   pio device monitor

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; Enable PSRAM
board_build.arduino.memory_type = qio_opi

; Serial monitor
monitor_speed = 115200

; Build flags for camera support
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1

; Partition scheme with larger app partition
board_build.partitions = huge_app.csv
